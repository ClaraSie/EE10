            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, var(--primary), #0a0e1a);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            box-shadow: 0 -4px 25px rgba(0,0,0,0.4);
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            flex: 1;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item.active { color: var(--text-white); transform: translateY(-3px); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* 頁面動畫 */
        .page { display: none; padding-bottom: 120px; }
        .page.active { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; position: relative; }
        
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #2c3e50 100%);
            color: var(--text-white);
            padding: 60px 24px;
            border-radius: 0 0 45px 45px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            top: -50px;
            left: -50px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 22px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow);
        }

        .title { font-size: 1.35rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .subtitle { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 18px; font-weight: 500; letter-spacing: 0.5px; }

        .alert-box {
            background: rgba(93, 74, 55, 0.07);
            border-left: 5px solid var(--secondary);
            padding: 16px;
            font-size: 13.5px;
            color: #3d3d3d;
            margin-top: 15px;
            border-radius: 10px;
            line-height: 1.8;
        }

        /* 日期選擇器 */
        .day-selector {
            display: flex;
            overflow-x: auto;
            padding: 16px 20px;
            gap: 12px;
            background: rgba(253, 252, 248, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            scrollbar-width: none;
        }
        .day-selector::-webkit-scrollbar { display: none; }

        .day-btn {
            white-space: nowrap;
            padding: 12px 26px;
            border-radius: 35px;
            border: 1.8px solid var(--secondary);
            background: transparent;
            font-weight: 700;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .day-btn.active { 
            background: var(--secondary); 
            color: var(--text-white); 
            box-shadow: 0 6px 18px rgba(93, 74, 55, 0.35);

        }

        /* 時間軸 */

        .timeline-item { position: relative; margin-bottom: 40px; }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -41px;
            top: 6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            border: 4px solid var(--bg-main);
            box-shadow: 0 0 0 2px var(--accent);

        }

        .timeline-item.time-muted::before { background: #B0B0B0; box-shadow: 0 0 0 2px #D0D0D0; }

        .item-content {

            align-items: center;

</head>

        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });

            const target = document.getElementById(pageId);

            btn.classList.add('active');
            window.scrollTo(0, 0);
        }

        function showDay(index) {
            document.querySelectorAll('.day-btn').forEach((b, i) => b.classList.toggle('active', i === index));
            const container = document.getElementById('timelineContent');
            const day = tripData[index];
            let html = `<h2 style="margin-top:0; font-size:1.2rem; color: var(--secondary); border-bottom:3px solid var(--secondary); display:inline-block; padding-bottom:5px;">${day.date}</h2><div class="timeline" style="margin-top:25px;">`;
            
            day.events.forEach(ev => {
                const timeMutedClass = ev.timeMuted ? 'time-muted' : '';
                html += `
                    <div class="timeline-item ${timeMutedClass}">
                        <span class="time">${ev.time}</span>
                        <div class="item-content">
                            <strong style="font-size:16px; display:block; margin-bottom:5px;">${ev.title}</strong>
                            <div style="font-size:13px; color:var(--text-sub); line-height:1.6;">${ev.desc}</div>
                            ${ev.info ? `<span class="shop-info">ℹ️ ${ev.info}</span>` : ''}
                            ${ev.timetable ? `<a href="${ev.timetable}" class="timetable-link" target="_blank">⏰ 巴士時刻表</a><br>` : ''}
                            ${ev.url ? `<a href="${ev.url}" class="map-btn" target="_blank">📍 地圖搜尋</a>` : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html + `</div>`;
            window.scrollTo(0, 0); // 切換日期置頂
        }

        document.addEventListener('DOMContentLoaded', () => {
            showDay(0);
            
            const setupList = (containerId, items) => {
                const container = document.getElementById(containerId);
                items.forEach(item => {
                    container.innerHTML += `
                        <div class="list-item">
                            <span><span class="list-dot">/</span>${item}</span>
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item)}" 
                               target="_blank" style="color:var(--nature); text-decoration:none; font-size:18px;">📍</a>
                        </div>`;
                });
            };

            setupList('ramenList', [
                "人類みな麺類 LUCUA (B2)", "ラーメン家 あかぎ (泡系雞白湯)", "Gion Duck Noodles (祇園鴨拉麵)",
                "燃えよ麺助 (福島名店)", "麦と麺助 新梅田中津店", "天丼 Makino 難波千日前店",
                "すし酒場 さしす (壽司酒場)", "鳥貴族 阪急東通り3號店", "中華そば 桐麺 梅田店", "grenier Umeda (千層酥)"
            ]);

            setupList('toyList', [
                "Jungle (日本橋本店)", "Mandarake (二手玩具中心)", "Torejaras (とれじゃらす)"
            ]);
        });
    </script>
</body>
</html>
